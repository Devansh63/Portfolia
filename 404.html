<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Devansh Agrawal</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Devansh Agrawal's portfolio." />
  <meta name="robots" content="noindex" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23e85d34'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='900' font-size='18' fill='white'>D</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0706;
      color: #ffffff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background — same vibe as the main site */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 55px 55px;
      pointer-events: none;
    }

    /* Orange glow in corner */
    body::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,93,52,0.15) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 560px;
      text-align: center;
    }

    .code {
      font-size: clamp(8rem, 22vw, 14rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.05em;
      color: rgba(255,255,255,0.08);
      margin-bottom: -20px;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: #e85d34;
      color: #fff;
      text-decoration: none;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.2s ease;
      touch-action: manipulation;
    }
    .home-btn:hover { transform: translateY(-2px); }
    .home-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

    .home-btn:focus-visible {
      outline: 2px solid #c8f02f;
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>Looks like that link's a dead end. The page you're after doesn't exist or got moved somewhere else.</p>
    <a href="/" class="home-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to home
    </a>
  </div>
</body>
</html>
